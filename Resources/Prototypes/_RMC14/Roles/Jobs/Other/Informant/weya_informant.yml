- type: entity
  id: RMCRandomHumanoidWeYaInformant
  name: WeYa Informant
  suffix: Spawner, Informant
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/fax_machine.rsi
    state: icon
  - type: RandomHumanoidSpawner
    settings: RMCWeYaInformantSettings

- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: RMCWeYaInformantSettings
  components:
  - type: Rank
    rank: RMCRankCivilian
  - type: Loadout
    prototypes: [ RMCGearWeYaInformant  ]
  - type: GhostRole
    name: "WeYa Informant"
    description: "You are a informant for the Weston-Yamada Corporation. Relay any happenings in the area to them via fax. Try not to let the public know. The GM probably has a specific job in mind..."
    rules: "You do not remember your previous life. You are NOT hostile to any faction unless directed to be by the GM or a admin. Try to blend in, and behave as a civilian colonist would."
    reregister: false
    raffle:
      settings: short
  - type: GhostRoleApplySpecial
  - type: Skills
    skills:
      RMCSkillConstruction: 1
      RMCSkillEndurance: 2
      RMCSkillFireman: 1
      RMCSkillFirearms: 1

- type: startingGear
  id: RMCGearWeYaInformant
  equipment:
    jumpsuit: CMJumpsuitColonist
    back: RMCSatchelWeYaInformantFill
    shoes: RMCShoesBlack
    id: RMCIDCardWeYaInformantFakeID
    ears: CMHeadsetColony
    pocket1: RMCPouchSurvivalFill
    pocket2: RMCPouchGeneral

- type: entity
  parent: CMIDCardGold
  id: RMCIDCardWeYaInformant
  name: "WeYa Informant ID card"
  description: A shiny ID card, issued to the covert intelligence agents of the Weston-Yamada Corporation. You probably don't have the security level required to see this.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/general.rsi
    state: general
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/general.rsi
  - type: PresetIdCard
    name: "WeYa Informant ID Card"

- type: entity
  parent: CMIDCardLanyard
  id: RMCIDCardWeYaInformantFakeID
  name: colonist ID card
  components:
  - type: PresetIdCard
    job: CMSurvivor
  - type: ItemIFF
    faction: FactionSurvivor

- type: entity
  parent: CMSatchel
  id: RMCSatchelWeYaInformantFill
  suffix: Informant, Filled
  components:
  - type: StorageFill
    contents:
    - id: CMClipboard
    - id: RMCIDCardWeYaInformant
    - id: CMPenFountain
    - id: CMSheetMetal20
    - id: CMWeaponPistolM1984
    - id: CMMagazinePistolM1984
